name: iOSBuild

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

concurrency:
  group: ios-release-${{ github.ref }}

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      # ----------------------
      # Node / pnpm
      # ----------------------
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      # pnpm cache
      - name: Cache pnpm
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - run: pnpm install

      # ----------------------
      # Rust
      # ----------------------
      - uses: dtolnay/rust-toolchain@stable

      # Rust cache
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Add iOS targets
        run: rustup target add aarch64-apple-ios

      # ----------------------
      # App Store Connect API key
      # ----------------------
      - name: Install App Store Connect API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APPLE_API_KEY_P8 }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          echo "APPLE_API_KEY_PATH=$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8" >> "$GITHUB_ENV"

      # ----------------------
      # build
      # ----------------------
      - name: Compute version code
        run: echo "VERSION_CODE=$(date -u +%Y%m%d%H)" >> "$GITHUB_ENV"

      - run: pnpm build

      - name: Build iOS
        run: pnpm tauri ios build --export-method app-store-connect --config "{\"bundle\":{\"iOS\":{\"bundleVersion\":\"${VERSION_CODE}\"}}}"
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}

      # ----------------------
      # artifact
      # ----------------------
      - uses: actions/upload-artifact@v7
        with:
          name: ios-build
          path: src-tauri/gen/apple/build/arm64/*.ipa

      # ----------------------
      # TestFlight
      # ----------------------
      - name: Upload to TestFlight
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          xcrun altool --upload-app --type ios \
            --file src-tauri/gen/apple/build/arm64/*.ipa \
            --apiKey "${{ secrets.APPLE_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPLE_API_ISSUER }}"
