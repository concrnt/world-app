name: build-android

on:
  push:
    branches: [main]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Node + pnpm
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: corepack enable

      - run: pnpm install

      # Rust
      - uses: dtolnay/rust-toolchain@stable

      - name: Add Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android

      # Android SDK
      - uses: android-actions/setup-android@v3

      # keystore復元
      - name: Restore keystore
        run: |
          mkdir -p src-tauri/gen/android
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > src-tauri/gen/android/keystore.jks

      # keystore.properties生成
      - name: Create keystore.properties
        run: |
          cat <<EOF > src-tauri/gen/android/keystore.properties
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          password=${{ secrets.ANDROID_KEY_PASSWORD }}
          storeFile=keystore.jks
          EOF

      # フロントビルド（必要なら）
      - run: pnpm build

      # Tauri Android build
      - name: Build Android
        run: |
          cd src-tauri
          cargo install tauri-cli --locked || true
          tauri android build

      # artifact upload
      - uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            src-tauri/gen/android/app/build/outputs/**/*.apk
            src-tauri/gen/android/app/build/outputs/**/*.aab
