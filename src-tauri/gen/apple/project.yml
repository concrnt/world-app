# WARNING: do not run `pnpm tauri ios init` / `tauri ios init` — it
# regenerates this file from scratch and will drop the NotifyService target
# (Notification Service Extension, used for push notifications; see
# ../../../plugins/tauri-plugin-push/README.md) along with its entitlements
# and the app's aps-environment / App Group entitlements below. If
# regeneration is ever unavoidable, re-apply this file's git diff afterwards.
name: world-app
options:
  bundleIdPrefix: world.concrnt.app
  deploymentTarget:
    iOS: 14.0
fileGroups: [../../src]
configs:
  debug: debug
  release: release
settingGroups:
  app:
    base:
      PRODUCT_NAME: world-app
      PRODUCT_BUNDLE_IDENTIFIER: world.concrnt.app
targetTemplates:
  app:
    type: application
    sources:
      - path: Sources
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      groups: [app]
targets:
  world-app_iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
      # NOTE: do NOT list `Externals` here. It is a gitignored build-output dir
      # holding the per-arch libapp.a; scanning it as sources makes xcodegen copy
      # those .a files into the app bundle as resources, which collides with the
      # framework dependency below ("Multiple commands produce .../libapp.a").
      # libapp.a is linked via the `framework: libapp.a` dependency +
      # LIBRARY_SEARCH_PATHS, so no source entry is needed.
      - path: world-app_iOS
      - path: assets
        buildPhase: resources
        type: folder
      - path: LaunchScreen.storyboard
    info:
      path: world-app_iOS/Info.plist
      properties:
        # NOTE: this Info.plist is generated from these properties by xcodegen.
        # Keys not managed by Tauri/tauri.conf.json (permission usage strings,
        # display name, export-compliance flag, ...) MUST live here or they are
        # dropped on the next `xcodegen generate`. See the header warning above.
        ITSAppUsesNonExemptEncryption: false
        CFBundleName: Concrnt
        CFBundleDisplayName: Concrnt
        CFBundleShortVersionString: 0.1.5
        CFBundleVersion: "0.1.5"
        LSRequiresIPhoneOS: true
        NSFaceIDUsageDescription: FaceID はマスターキーを保護するために使用されます。
        NSCameraUsageDescription: カメラは、ログイン QR を読み込むために使用されます。
        NSPhotoLibraryAddUsageDescription: 画像を写真ライブラリに保存するために使用されます。
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities: [arm64, metal]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
    entitlements:
      path: world-app_iOS/world-app_iOS.entitlements
      properties:
        aps-environment: development
        com.apple.security.application-groups:
          - group.world.concrnt.app
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      base:
        ENABLE_BITCODE: false
        ARCHS: [arm64]
        VALID_ARCHS: arm64 
        LIBRARY_SEARCH_PATHS[arch=x86_64]: $(inherited) $(PROJECT_DIR)/Externals/x86_64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(TOOLCHAIN_DIR)/usr/lib/swift/$(PLATFORM_NAME) $(TOOLCHAIN_DIR)/usr/lib/swift-5.0/$(PLATFORM_NAME)
        LIBRARY_SEARCH_PATHS[arch=arm64]: $(inherited) $(PROJECT_DIR)/Externals/arm64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(TOOLCHAIN_DIR)/usr/lib/swift/$(PLATFORM_NAME) $(TOOLCHAIN_DIR)/usr/lib/swift-5.0/$(PLATFORM_NAME)
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: true
        EXCLUDED_ARCHS[sdk=iphoneos*]: x86_64
      groups: [app]
    dependencies:
      - framework: libapp.a
        embed: false
      - sdk: CoreGraphics.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: Security.framework
      - sdk: UIKit.framework
      - sdk: WebKit.framework
      - target: NotifyService
        embed: true
    preBuildScripts:
      - script: pnpm tauri ios xcode-script -v --platform ${PLATFORM_DISPLAY_NAME:?} --sdk-root ${SDKROOT:?} --framework-search-paths "${FRAMEWORK_SEARCH_PATHS:?}" --header-search-paths "${HEADER_SEARCH_PATHS:?}" --gcc-preprocessor-definitions "${GCC_PREPROCESSOR_DEFINITIONS:-}" --configuration ${CONFIGURATION:?} ${FORCE_COLOR} ${ARCHS:?}
        name: Build Rust Code
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(SRCROOT)/Externals/x86_64/${CONFIGURATION}/libapp.a
          - $(SRCROOT)/Externals/arm64/${CONFIGURATION}/libapp.a

  # Notification Service Extension: decrypts the WebPush payload relayed
  # (still encrypted) through webpush-relay and rewrites the notification's
  # title/body before display. See ../../../plugins/tauri-plugin-push/README.md.
  NotifyService:
    type: app-extension
    platform: iOS
    deploymentTarget: "14.0"
    sources:
      - path: NotifyService
      - path: ../../../plugins/tauri-plugin-push/ios/Sources/PushShared
    info:
      path: NotifyService/Info.plist
      properties:
        CFBundleDisplayName: NotifyService
        CFBundleShortVersionString: 0.1.0
        CFBundleVersion: "0.1.0"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationService
    entitlements:
      path: NotifyService/NotifyService.entitlements
      properties:
        com.apple.security.application-groups:
          - group.world.concrnt.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: world.concrnt.app.NotifyService
        SKIP_INSTALL: true
        ENABLE_BITCODE: false
        ARCHS: [arm64]
        VALID_ARCHS: arm64
        EXCLUDED_ARCHS[sdk=iphoneos*]: x86_64
    dependencies:
      - sdk: UserNotifications.framework
      - sdk: Security.framework